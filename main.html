<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尝尝咸淡 - 智能烹饪助手</title>
    <!-- 使用本地或更稳定的 CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --bg-color: #f7f9fc;
            --chat-bg: #ffffff;
            --user-msg-bg: #ff6b6b;
            --bot-msg-bg: #f1f3f5;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background-color: var(--chat-bg);
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .header {
            padding: 20px;
            background-color: #fff;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header i {
            color: var(--primary-color);
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }

        .message.user {
            align-self: flex-end;
            margin-left: auto;
        }

        .message.bot {
            align-self: flex-start;
            margin-right: auto;
        }

        .message-content {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            word-wrap: break-word;
        }

        .user .message-content {
            background-color: var(--user-msg-bg);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .bot .message-content {
            background-color: var(--bot-msg-bg);
            color: var(--text-color);
            border-bottom-left-radius: 2px;
        }

        .message-meta {
            font-size: 0.75rem;
            color: #999;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .user .message-meta {
            justify-content: flex-end;
        }

        .input-area {
            padding: 20px;
            background-color: #fff;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            transition: border-color 0.3s;
            font-size: 1rem;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        button:hover {
            transform: scale(1.05);
            background-color: #ff5252;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 10px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background-color: #ccc;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Markdown Styles */
        .markdown-body {
            font-family: inherit;
        }
        .markdown-body p { margin-bottom: 0.5em; }
        .markdown-body pre { background: #e9ecef; padding: 10px; border-radius: 5px; overflow-x: auto; }
        .markdown-body code { font-family: monospace; background: rgba(0,0,0,0.05); padding: 2px 4px; border-radius: 3px; }
        
        .router-info {
            font-size: 0.8em;
            color: #666;
            margin-bottom: 5px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-utensils"></i> 尝尝咸淡 - AI 烹饪助手</h1>
            <div style="font-size: 0.8rem; color: #888;">Powered by GraphRAG</div>
        </div>
        
        <div class="chat-area" id="chatArea">
            <div class="message bot">
                <div class="message-content">
                    你好！我是您的智能烹饪助手。想吃点什么？或者有什么烹饪问题想问我？🥘
                </div>
            </div>
        </div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="输入您的问题，例如：如何做红烧肉..." autocomplete="off">
            <button id="sendBtn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        let isProcessing = false;

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !isProcessing) {
                sendMessage();
            }
        });

        async function sendMessage() {
            const question = userInput.value.trim();
            if (!question) return;

            // 获取用户信息，并清空输入框和冻结界面，防止在AI未回复前就提交问题。
            appendMessage('user', question);
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;
            isProcessing = true;

            // 创建机器人消息容器（用于流式传输）
            const botMessageId = 'msg-' + Date.now();
            const contentDiv = appendMessage('bot', '', botMessageId);
            
            // 添加加载/打字指示器，占位与动画
            const loader = document.createElement('div');
            loader.className = 'typing-indicator';
            loader.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
            contentDiv.appendChild(loader);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question })
                });

                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                
                // 获取阅读器
                const reader = response.body.getReader();
                const decoder = new TextDecoder();  // 翻译成文字
                let fullText = '';
                let routerInfo = null;

                // Remove loader（加载指示器）
                contentDiv.removeChild(loader);

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    
                    fullText += chunk;
                    
                    // 实时渲染 Markdown
                    contentDiv.innerHTML = marked.parse(fullText);
                    chatArea.scrollTop = chatArea.scrollHeight;
                }

            } catch (error) {
                contentDiv.innerHTML = `<span style="color: red;">出错了: ${error.message}</span>`;
            } finally {
                userInput.disabled = false;
                userInput.focus();
                sendBtn.disabled = false;
                isProcessing = false;
            }
        }

        // 聊天气泡制作
        function appendMessage(role, text, id = null) {
            // 制作气泡外壳
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            // 制作气泡内容
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content markdown-body';
            if (id) contentDiv.id = id;  // 如果指定了ID，则通常用于机器人回答，方便后续更新
            
            // 填充文字逻辑：
            // - 机器人(bot): 直接放入 raw text，稍后会有 marked.js 来渲染它。
            // - 用户(user): 把换行符 (\n) 替换成 HTML 的换行标签 (<br>)，防止文字挤在一起。
            contentDiv.innerHTML = role === 'bot' ? text : text.replace(/\n/g, '<br>');
            
            msgDiv.appendChild(contentDiv);
            
            // if (role === 'bot') {
            //     const metaDiv = document.createElement('div');
            //     metaDiv.className = 'message-meta';
            //     msgDiv.appendChild(metaDiv);
            // }

            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
            return contentDiv;
        }
    </script>
</body>
</html>
